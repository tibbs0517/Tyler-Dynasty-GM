name: Update League Data

on:
  workflow_dispatch:

  schedule:
    - cron: '0 * * * *'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run League Update
        run: |
          python update_league.py
          python scripts/download_players.py
          python scripts/build_player_index.py
          python scripts/find_unrostered_players.py
          python scripts/build_league_database.py
          python scripts/build_enriched_players.py

      - name: Commit Updated Files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .

          git diff --cached --quiet || git commit -m "Automatic league update"

          git push
