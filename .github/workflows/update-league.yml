name: Update League Data

on:
  workflow_dispatch:

  schedule:
    - cron: "0 * * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run League Update
        run: |
          python update_league.py

      - name: Download Transactions
        run: |
          python scripts/download_transactions.py

      - name: Download Players
        run: |
          python scripts/download_players.py

      - name: Build Player Index
        run: |
          python scripts/build_player_index.py

      - name: Find Unrostered Players
        run: |
          python scripts/find_unrostered_players.py

      - name: Build League Database
        run: |
          python scripts/build_league_database.py

      - name: Build Enriched Players
        run: |
          python scripts/build_enriched_players.py

      - name: Build Waiver Board
        run: |
          python scripts/build_waiver_board.py

      - name: Calculate Player Values
        run: |
          python scripts/value_engine.py

      - name: Build AI Context
        run: |
          python scripts/build_ai_context.py

      - name: Analyze Transactions
        run: |
          python analyze_transactions.py

      - name: Generate GM Report
        run: |
          python scripts/gm_report.py

      - name: Commit Updated Files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .

          git diff --cached --quiet || git commit -m "Automatic league update"

          git push